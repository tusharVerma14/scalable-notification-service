spring:
  application:
    name: notification-server

  # Enable Java 21 Virtual Threads natively!
  threads:
    virtual:
      enabled: true

  # Database Connection
  datasource:
    url: jdbc:mysql://localhost:3306/notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis Connection
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ Connection
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 5000ms
          max-attempts: 5

server:
  port: 8080
